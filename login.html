<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In – JCU Founders</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      background: #e8f1fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 5%;
    }
    .auth-wrapper {
      background: white;
      max-width: 480px;
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
      padding: 56px 48px;
    }
    .auth-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .auth-brand img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      background: #002b5c;
      border-radius: 10px;
      padding: 5px;
    }
    .auth-brand span {
      font-size: 20px;
      font-weight: bold;
      color: #002b5c;
    }
    .auth-wrapper h1 {
      color: #002b5c;
      font-size: 28px;
      margin-bottom: 6px;
    }
    .auth-subtitle {
      color: #888;
      font-size: 15px;
      margin-bottom: 28px;
    }
    .auth-subtitle a {
      color: #002b5c;
      font-weight: bold;
      text-decoration: none;
    }
    .auth-subtitle a:hover { text-decoration: underline; }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: bold;
      color: #002b5c;
      font-size: 14px;
      margin-bottom: 7px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #dde3ee;
      border-radius: 10px;
      font-size: 15px;
      color: #222;
      outline: none;
      transition: border-color 0.2s;
      background: #fafbfd;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: #002b5c;
      background: white;
    }
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -12px;
      margin-bottom: 20px;
    }
    .forgot-row a {
      font-size: 13px;
      color: #0066cc;
      text-decoration: none;
    }
    .forgot-row a:hover { text-decoration: underline; }
    .auth-btn {
      width: 100%;
      background: #ffcc00;
      color: #002b5c;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .auth-btn:hover {
      background: #f4b400;
      transform: translateY(-2px);
    }
    .login-error {
      background: #fdecea;
      border: 1.5px solid #e74c3c;
      color: #c0392b;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .login-error.show { display: block; }
    .no-account {
      text-align: center;
      font-size: 14px;
      color: #888;
      margin-top: 24px;
    }
    .no-account a {
      color: #002b5c;
      font-weight: bold;
      text-decoration: none;
    }
    .no-account a:hover { text-decoration: underline; }
    @media(max-width: 600px) {
      .auth-wrapper { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <a href="./index.html" class="logo-link">
      <img src="./images/FIR_logo HD JCU.jpg" alt="JCU Logo" class="logo">
    </a>
    <h2>JCU Founders</h2>
  </div>
  <div class="nav-right">
    <a href="./index.html">Home</a>
    <a href="./plans.html">Membership Plans</a>
    <a href="./about.html">About</a>
    <a href="./contact.html">Contact</a>
    <a href="./my-plan.html" id="myPlanNavLink" style="display:none">My Plan</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-wrapper">

    <div class="auth-brand">
      <img src="./images/FIR_logo HD JCU.jpg" alt="JCU Logo">
      <span>JCU Founders</span>
    </div>

    <h1>Welcome to JCU Founders</h1>
    <p class="auth-subtitle">Don't have an account? <a href="./signup.html">Sign up for free</a></p>

    <div class="login-error" id="loginError">
      Please enter your email and password.
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com" onkeydown="if(event.key==='Enter') handleLogin()">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password" onkeydown="if(event.key==='Enter') handleLogin()">
    </div>

    <div class="forgot-row">
      <a href="#">Forgot your password?</a>
    </div>

    <button class="auth-btn" onclick="handleLogin()">Log In</button>

    <p class="no-account">Don't have an account? <a href="./signup.html">Create one here →</a></p>

  </div>
</div>

<footer<footer>© 2026 JCU Founders-in-Residence Commercialisation</footer>

<script>
  function handleLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errorBox = document.getElementById("loginError");

    if (!email || !password) {
      errorBox.textContent = "⚠️ Please enter your email and password.";
      errorBox.classList.add("show");
      return;
    }

    // Check against sessionStorage user (created at signup)
    const storedEmail = sessionStorage.getItem("userEmail");

    if (email === storedEmail && password.length >= 8) {
      errorBox.classList.remove("show");
      sessionStorage.setItem("loggedIn", "true");
      // If user clicked Get Started before logging in, send them to payment page
      // Otherwise send to home page
      var redirect = sessionStorage.getItem("loginRedirect");
      sessionStorage.removeItem("loginRedirect");
      if (redirect) {
        window.location.href = redirect;
      } else {
        window.location.href = "index.html";
      }
    } else {
      errorBox.textContent = "⚠️ Incorrect email or password. Please try again.";
      errorBox.classList.add("show");
    }
  }
</script>


<script>
  function requireLogin(destination) {
    if (sessionStorage.getItem("loggedIn") === "true") {
      window.location.href = destination;
    } else {
      sessionStorage.setItem("loginRedirect", destination);
      document.getElementById("loginGateOverlay").style.display = "flex";
    }
  }

  (function(){
    if(sessionStorage.getItem("myPlan")){
      var el = document.getElementById("myPlanNavLink");
      if(el) el.style.display = "inline";
    }
    var btn = document.getElementById("authBtn");
    if(btn && sessionStorage.getItem("loggedIn") === "true"){
      btn.textContent = "Log Out";
      btn.style.color = "#000";
      btn.removeAttribute("href");
      btn.style.cursor = "pointer";
      btn.onclick = function(){ document.getElementById("logoutOverlay").style.display = "flex"; };
    }
  })();
</script>
</body>
</html>
